{% extends "base.html" %}

{% block title %}Log In{% endblock %}

{% block content %}

<h1>Log In</h1>

{% if form.errors %}
    <p>Invalid username or password.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button type="submit">Log In</button>
</form>

<p>
    No account yet?
    <a href="{% url 'register' %}">Register</a>
</p>

{% endblock %}
