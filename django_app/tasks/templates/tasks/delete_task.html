{% extends "base.html" %}

{% block title %}Delete Task{% endblock %}

{% block content %}

<h1>Delete Task</h1>

<p>
    Are you sure you want to delete
    "<strong>{{ task.title }}</strong>"?
</p>

<form method="post">
    {% csrf_token %}

    <button type="submit">
        Delete
    </button>
</form>

<p>
    <a href="{% url 'task_detail' task.pk %}">
        Cancel
    </a>
</p>

{% endblock %}
